[package]
name = "astracat-dns-resolver"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "astracat-dns-resolver"
path = "main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
trust-dns-proto = "0.22"
dashmap = "5.5"
once_cell = "1.18"
prometheus = "0.13"
hyper = { version = "0.14", features = ["full"] }
libc = "0.2"
